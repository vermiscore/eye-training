<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eye Training</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #00c853;
    --primary-dark: #1b5e20;
    --bg: #0a1a0a;
    --bg2: #0f2510;
    --bg3: #162e16;
    --accent: #69f0ae;
    --text: #c8e6c9;
    --text-dim: #4caf50;
    --border: #2e7d32;
  }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 {
    font-size: 1.3rem;
    color: var(--accent);
    letter-spacing: 0.05em;
  }
  header .eye-icon {
    font-size: 1.5rem;
  }

  /* Nav Tabs */
  nav {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 4px;
    padding: 0 16px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  nav::-webkit-scrollbar { display: none; }
  nav button {
    background: none;
    border: none;
    color: var(--text-dim);
    padding: 12px 20px;
    cursor: pointer;
    font-size: 0.9rem;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  nav button:hover { color: var(--accent); }
  nav button.active {
    color: var(--accent);
    border-bottom-color: var(--primary);
    background: rgba(0, 200, 83, 0.06);
  }

  /* Main layout */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    gap: 20px;
  }

  /* Canvas container */
  .canvas-wrap {
    position: relative;
    background: #000;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(0,200,83,0.1);
    max-width: 100%;
  }
  canvas {
    display: block;
    max-width: 100%;
  }

  /* Overlay for countdown/ready */
  .canvas-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    z-index: 10;
  }
  .canvas-overlay.hidden { display: none; }
  .overlay-title {
    font-size: 1.1rem;
    color: var(--text-dim);
  }
  .overlay-count {
    font-size: 4rem;
    font-weight: 700;
    color: var(--accent);
  }

  /* Controls */
  .controls {
    width: 100%;
    max-width: 700px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .ctrl-row {
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .ctrl-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
    min-width: 140px;
  }
  .ctrl-group label {
    font-size: 0.8rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .ctrl-group .val {
    font-size: 0.85rem;
    color: var(--accent);
    font-weight: 600;
  }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 4px;
    background: var(--bg3);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--primary);
    cursor: pointer;
  }
  input[type=range]::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--primary);
    border: none;
    cursor: pointer;
  }

  select {
    background: var(--bg3);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 10px;
    font-size: 0.9rem;
    cursor: pointer;
    outline: none;
  }
  select:focus { border-color: var(--primary); }

  /* Buttons */
  .btn {
    border: none;
    border-radius: 6px;
    padding: 10px 28px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }
  .btn-primary {
    background: var(--primary);
    color: #000;
  }
  .btn-primary:hover { background: #00e676; }
  .btn-stop {
    background: #b71c1c;
    color: #fff;
  }
  .btn-stop:hover { background: #d32f2f; }
  .btn-secondary {
    background: var(--bg3);
    color: var(--accent);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--primary); }

  /* Footer / session info */
  footer {
    background: var(--bg2);
    border-top: 1px solid var(--border);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 24px;
    font-size: 0.85rem;
    color: var(--text-dim);
    flex-wrap: wrap;
  }
  footer .stat {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  footer .stat-val {
    color: var(--accent);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  /* Peripheral score */
  .score-display {
    font-size: 1.1rem;
    color: var(--accent);
    font-weight: 700;
    text-align: center;
  }

  /* Hidden util */
  .hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <span class="eye-icon">👁</span>
  <h1>Eye Training</h1>
</header>

<nav id="nav">
  <button class="active" data-tab="pursuit">Smooth Pursuit</button>
  <button data-tab="saccade">Saccade</button>
  <button data-tab="convergence">Vergence</button>
  <button data-tab="peripheral">Peripheral Vision</button>
</nav>

<main>
  <div class="canvas-wrap">
    <canvas id="canvas" width="680" height="400"></canvas>
    <div class="canvas-overlay" id="overlay">
      <div class="overlay-title" id="overlay-title">Press Start when ready</div>
      <div class="overlay-count" id="overlay-count"></div>
    </div>
  </div>

  <!-- ===== PURSUIT CONTROLS ===== -->
  <div class="controls" id="ctrl-pursuit">
    <div class="ctrl-row">
      <div class="ctrl-group">
        <label>Pattern</label>
        <select id="pursuit-pattern">
          <option value="circle">Circle</option>
          <option value="figure8">Figure 8</option>
          <option value="random">Random</option>
        </select>
      </div>
      <div class="ctrl-group">
        <label>Speed <span class="val" id="pursuit-speed-val">3</span></label>
        <input type="range" id="pursuit-speed" min="1" max="10" value="3">
      </div>
      <div class="ctrl-group">
        <label>Duration <span class="val" id="pursuit-dur-val">60</span>s</label>
        <input type="range" id="pursuit-dur" min="10" max="120" step="10" value="60">
      </div>
    </div>
    <div class="ctrl-row">
      <button class="btn btn-primary" id="pursuit-start">Start</button>
      <button class="btn btn-stop hidden" id="pursuit-stop">Stop</button>
    </div>
  </div>

  <!-- ===== SACCADE CONTROLS ===== -->
  <div class="controls hidden" id="ctrl-saccade">
    <div class="ctrl-row">
      <div class="ctrl-group">
        <label>Direction</label>
        <select id="sacc-dir">
          <option value="horizontal">Horizontal</option>
          <option value="vertical">Vertical</option>
          <option value="diagonal">Diagonal</option>
          <option value="random">Random</option>
        </select>
      </div>
      <div class="ctrl-group">
        <label>Interval <span class="val" id="sacc-int-val">1.0</span>s</label>
        <input type="range" id="sacc-int" min="0.3" max="3.0" step="0.1" value="1.0">
      </div>
      <div class="ctrl-group">
        <label>Duration <span class="val" id="sacc-dur-val">60</span>s</label>
        <input type="range" id="sacc-dur" min="10" max="120" step="10" value="60">
      </div>
    </div>
    <div class="ctrl-row">
      <button class="btn btn-primary" id="sacc-start">Start</button>
      <button class="btn btn-stop hidden" id="sacc-stop">Stop</button>
    </div>
  </div>

  <!-- ===== CONVERGENCE CONTROLS ===== -->
  <div class="controls hidden" id="ctrl-convergence">
    <div class="ctrl-row">
      <div class="ctrl-group">
        <label>Mode</label>
        <select id="conv-mode">
          <option value="both">Approach + Recede</option>
          <option value="in">Approach only</option>
          <option value="out">Recede only</option>
        </select>
      </div>
      <div class="ctrl-group">
        <label>Speed <span class="val" id="conv-speed-val">3</span></label>
        <input type="range" id="conv-speed" min="1" max="8" value="3">
      </div>
      <div class="ctrl-group">
        <label>Duration <span class="val" id="conv-dur-val">60</span>s</label>
        <input type="range" id="conv-dur" min="10" max="120" step="10" value="60">
      </div>
    </div>
    <div class="ctrl-row">
      <button class="btn btn-primary" id="conv-start">Start</button>
      <button class="btn btn-stop hidden" id="conv-stop">Stop</button>
    </div>
  </div>

  <!-- ===== PERIPHERAL CONTROLS ===== -->
  <div class="controls hidden" id="ctrl-peripheral">
    <div class="ctrl-row">
      <div class="ctrl-group">
        <label>Difficulty</label>
        <select id="peri-diff">
          <option value="easy">Easy (large dots, longer display)</option>
          <option value="normal" selected>Normal</option>
          <option value="hard">Hard (small dots, brief display)</option>
        </select>
      </div>
      <div class="ctrl-group">
        <label>Rounds <span class="val" id="peri-rounds-val">5</span></label>
        <input type="range" id="peri-rounds" min="3" max="15" value="5">
      </div>
    </div>
    <div class="score-display hidden" id="peri-score-display"></div>
    <div class="ctrl-row">
      <button class="btn btn-primary" id="peri-start">Start</button>
      <button class="btn btn-stop hidden" id="peri-stop">Stop</button>
      <div id="peri-answer-btns" class="hidden" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
        <span style="color:var(--text-dim);font-size:0.9rem;">Count seen:</span>
      </div>
    </div>
  </div>
</main>

<footer>
  <div class="stat">Time left: <span class="stat-val" id="footer-time">--</span></div>
  <div class="stat">Sessions: <span class="stat-val" id="footer-session">0</span></div>
  <div class="stat" id="footer-score-wrap" style="display:none">Score: <span class="stat-val" id="footer-score">-</span></div>
</footer>

<script>
(function() {
  'use strict';

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  let W = canvas.width, H = canvas.height;

  function resizeCanvas() {
    const maxW = 680, maxH = 400;
    const avail = canvas.parentElement.clientWidth || window.innerWidth - 40;
    if (avail < maxW) {
      canvas.width  = avail;
      canvas.height = Math.round(avail * maxH / maxW);
    } else {
      canvas.width  = maxW;
      canvas.height = maxH;
    }
    W = canvas.width;
    H = canvas.height;
  }
  resizeCanvas();
  window.addEventListener('resize', () => {
    if (!running) { resizeCanvas(); clearCanvas(); showOverlay('Press Start when ready', ''); }
  });
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlay-title');
  const overlayCount = document.getElementById('overlay-count');

  // ── State ──────────────────────────────────────────────
  let activeTab = 'pursuit';
  let animId = null;
  let sessionTimer = null;
  let sessionRemaining = 0;
  let sessionCount = 0;
  let running = false;

  // ── Tab switching ──────────────────────────────────────
  document.getElementById('nav').addEventListener('click', e => {
    const btn = e.target.closest('[data-tab]');
    if (!btn) return;
    if (running) stopAll();
    activeTab = btn.dataset.tab;
    document.querySelectorAll('nav button').forEach(b => b.classList.toggle('active', b === btn));
    ['pursuit','saccade','convergence','peripheral'].forEach(t => {
      document.getElementById('ctrl-' + t).classList.toggle('hidden', t !== activeTab);
    });
    showOverlay('Press Start when ready', '');
    clearCanvas();
  });

  // ── Slider live labels ─────────────────────────────────
  function bindSlider(id, valId, fmt) {
    const el = document.getElementById(id);
    const lbl = document.getElementById(valId);
    if (!el || !lbl) return;
    el.addEventListener('input', () => { lbl.textContent = fmt ? fmt(el.value) : el.value; });
  }
  bindSlider('pursuit-speed', 'pursuit-speed-val');
  bindSlider('pursuit-dur',   'pursuit-dur-val');
  bindSlider('sacc-int',      'sacc-int-val', v => parseFloat(v).toFixed(1));
  bindSlider('sacc-dur',      'sacc-dur-val');
  bindSlider('conv-speed',    'conv-speed-val');
  bindSlider('conv-dur',      'conv-dur-val');
  bindSlider('peri-rounds',   'peri-rounds-val');

  // ── Helpers ────────────────────────────────────────────
  function showOverlay(title, count) {
    overlay.classList.remove('hidden');
    overlayTitle.textContent = title;
    overlayCount.textContent = count;
  }
  function hideOverlay() { overlay.classList.add('hidden'); }
  function clearCanvas() {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
  }
  function setFooterTime(sec) {
    document.getElementById('footer-time').textContent = sec >= 0 ? sec + 's' : '--';
  }
  function stopAll() {
    running = false;
    if (animId) { cancelAnimationFrame(animId); animId = null; }
    if (sessionTimer) { clearInterval(sessionTimer); sessionTimer = null; }
    showOverlay('Press Start when ready', '');
    setFooterTime(-1);
    // reset buttons
    ['pursuit','sacc','conv','peri'].forEach(p => {
      const s = document.getElementById(p + '-start');
      const t = document.getElementById(p + '-stop');
      if (s) s.classList.remove('hidden');
      if (t) t.classList.add('hidden');
    });
    document.getElementById('peri-answer-btns').classList.add('hidden');
  }
  function startSession(durationSec, onDone) {
    sessionRemaining = durationSec;
    setFooterTime(sessionRemaining);
    sessionTimer = setInterval(() => {
      sessionRemaining--;
      setFooterTime(sessionRemaining);
      if (sessionRemaining <= 0) {
        clearInterval(sessionTimer);
        sessionTimer = null;
        onDone();
      }
    }, 1000);
  }
  function beginCountdown(cb) {
    showOverlay('Starting in', '3');
    let n = 3;
    const t = setInterval(() => {
      n--;
      if (n > 0) {
        overlayCount.textContent = n;
      } else {
        clearInterval(t);
        hideOverlay();
        cb();
      }
    }, 800);
  }
  function showStartStop(prefix) {
    document.getElementById(prefix + '-start').classList.add('hidden');
    document.getElementById(prefix + '-stop').classList.remove('hidden');
  }

  // ══════════════════════════════════════════════════════
  // 1. SMOOTH PURSUIT
  // ══════════════════════════════════════════════════════
  let pursuitState = {};

  function pursuitFrame(ts) {
    if (!running) return;
    const s = pursuitState;
    const speed = parseFloat(document.getElementById('pursuit-speed').value);
    const pattern = document.getElementById('pursuit-pattern').value;
    const dt = (ts - (s.lastTs || ts)) / 1000;
    s.lastTs = ts;
    s.t = (s.t || 0) + dt * speed * 0.5;

    let x, y;
    const cx = W / 2, cy = H / 2;
    const rx = W * 0.38, ry = H * 0.38;

    if (pattern === 'circle') {
      x = cx + rx * Math.cos(s.t);
      y = cy + ry * Math.sin(s.t);
    } else if (pattern === 'figure8') {
      x = cx + rx * Math.sin(s.t);
      y = cy + ry * Math.sin(s.t * 2) / 2;
    } else {
      // random: smooth random walk via sin combos
      x = cx + rx * 0.8 * Math.sin(s.t * 0.7 + 1.1) * Math.cos(s.t * 0.4);
      y = cy + ry * 0.8 * Math.sin(s.t * 0.5 + 2.3) * Math.cos(s.t * 0.3);
    }

    clearCanvas();

    // trail
    s.trail = s.trail || [];
    s.trail.push({x, y});
    if (s.trail.length > 40) s.trail.shift();
    for (let i = 0; i < s.trail.length - 1; i++) {
      const alpha = i / s.trail.length * 0.5;
      ctx.beginPath();
      ctx.strokeStyle = `rgba(0,200,83,${alpha})`;
      ctx.lineWidth = 2;
      ctx.moveTo(s.trail[i].x, s.trail[i].y);
      ctx.lineTo(s.trail[i+1].x, s.trail[i+1].y);
      ctx.stroke();
    }

    // ball
    const grad = ctx.createRadialGradient(x, y, 0, x, y, 18);
    grad.addColorStop(0, '#fff');
    grad.addColorStop(0.3, '#69f0ae');
    grad.addColorStop(1, 'rgba(0,200,83,0)');
    ctx.beginPath();
    ctx.arc(x, y, 18, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // center crosshair
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx - 10, cy); ctx.lineTo(cx + 10, cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, cy - 10); ctx.lineTo(cx, cy + 10); ctx.stroke();

    animId = requestAnimationFrame(pursuitFrame);
  }

  document.getElementById('pursuit-start').addEventListener('click', () => {
    const dur = parseInt(document.getElementById('pursuit-dur').value);
    showStartStop('pursuit');
    pursuitState = { t: 0, trail: [] };
    running = true;
    beginCountdown(() => {
      startSession(dur, () => {
        stopAll();
        sessionCount++;
        document.getElementById('footer-session').textContent = sessionCount;
        showOverlay('Session complete!', '');
      });
      animId = requestAnimationFrame(pursuitFrame);
    });
  });
  document.getElementById('pursuit-stop').addEventListener('click', stopAll);

  // ══════════════════════════════════════════════════════
  // 2. SACCADE
  // ══════════════════════════════════════════════════════
  let saccadeState = {};

  function randomSaccadePoint(exclude) {
    // Pick a random point in one of the canvas quadrants, away from center
    const margin = 70;
    const cx = W / 2, cy = H / 2;
    const minDist = 120;
    let x, y, tries = 0;
    do {
      x = margin + Math.random() * (W - margin * 2);
      y = margin + Math.random() * (H - margin * 2);
      tries++;
    } while (
      Math.hypot(x - cx, y - cy) < minDist ||
      (exclude && Math.hypot(x - exclude.x, y - exclude.y) < 100 && tries < 60)
    );
    return { x, y };
  }

  function saccadeLoop() {
    if (!running) return;
    const s = saccadeState;
    const dir = document.getElementById('sacc-dir').value;

    clearCanvas();

    // fixation cross at center
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    const cx = W/2, cy = H/2;
    ctx.beginPath(); ctx.moveTo(cx-12,cy); ctx.lineTo(cx+12,cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,cy-12); ctx.lineTo(cx,cy+12); ctx.stroke();

    if (dir === 'random') {
      // Show previous dot (dim) and current dot (bright)
      if (s.prevPt) {
        ctx.beginPath();
        ctx.arc(s.prevPt.x, s.prevPt.y, 10, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(0,200,83,0.2)';
        ctx.fill();
      }
      const pt = s.randomPt;
      if (pt) {
        const g = ctx.createRadialGradient(pt.x, pt.y, 0, pt.x, pt.y, 22);
        g.addColorStop(0, '#fff');
        g.addColorStop(0.35, '#69f0ae');
        g.addColorStop(1, 'rgba(0,200,83,0)');
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, 22, 0, Math.PI*2);
        ctx.fillStyle = g;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, 14 + (Date.now() % 600) / 600 * 8, 0, Math.PI*2);
        ctx.strokeStyle = 'rgba(105,240,174,0.4)';
        ctx.lineWidth = 2;
        ctx.stroke();
      }
      return;
    }

    let ax, ay, bx, by;
    const margin = 80;
    if (dir === 'horizontal') {
      ax = margin; ay = cy; bx = W - margin; by = cy;
    } else if (dir === 'vertical') {
      ax = cx; ay = margin; bx = cx; by = H - margin;
    } else {
      ax = margin; ay = margin; bx = W-margin; by = H-margin;
    }

    const active = s.activeIdx;
    const pts = [{x: ax, y: ay}, {x: bx, y: by}];

    // inactive dot (dim)
    const inact = 1 - active;
    ctx.beginPath();
    ctx.arc(pts[inact].x, pts[inact].y, 10, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,200,83,0.2)';
    ctx.fill();

    // active dot (bright)
    const px = pts[active].x, py = pts[active].y;
    const g = ctx.createRadialGradient(px, py, 0, px, py, 22);
    g.addColorStop(0, '#fff');
    g.addColorStop(0.35, '#69f0ae');
    g.addColorStop(1, 'rgba(0,200,83,0)');
    ctx.beginPath();
    ctx.arc(px, py, 22, 0, Math.PI*2);
    ctx.fillStyle = g;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(px, py, 14 + (Date.now() % 600) / 600 * 8, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(105,240,174,0.4)';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  function saccadeTick() {
    if (!running) return;
    const dir = document.getElementById('sacc-dir').value;
    if (dir === 'random') {
      saccadeState.prevPt = saccadeState.randomPt || null;
      saccadeState.randomPt = randomSaccadePoint(saccadeState.prevPt);
    } else {
      saccadeState.activeIdx = 1 - (saccadeState.activeIdx || 0);
    }
    saccadeLoop();
  }

  document.getElementById('sacc-start').addEventListener('click', () => {
    const dur = parseInt(document.getElementById('sacc-dur').value);
    const interval = parseFloat(document.getElementById('sacc-int').value) * 1000;
    const dir = document.getElementById('sacc-dir').value;
    showStartStop('sacc');
    saccadeState = { activeIdx: 0 };
    if (dir === 'random') {
      saccadeState.randomPt = randomSaccadePoint(null);
    }
    running = true;
    beginCountdown(() => {
      saccadeLoop();
      const ticker = setInterval(() => {
        if (!running) { clearInterval(ticker); return; }
        saccadeTick();
      }, interval);
      saccadeState.ticker = ticker;
      startSession(dur, () => {
        clearInterval(ticker);
        stopAll();
        sessionCount++;
        document.getElementById('footer-session').textContent = sessionCount;
        showOverlay('Session complete!', '');
      });
    });
  });
  document.getElementById('sacc-stop').addEventListener('click', () => {
    if (saccadeState.ticker) clearInterval(saccadeState.ticker);
    stopAll();
  });

  // ══════════════════════════════════════════════════════
  // 3. CONVERGENCE / DIVERGENCE
  // ══════════════════════════════════════════════════════
  let convState = {};

  function convFrame(ts) {
    if (!running) return;
    const s = convState;
    const speed = parseFloat(document.getElementById('conv-speed').value);
    const mode = document.getElementById('conv-mode').value;
    const dt = (ts - (s.lastTs || ts)) / 1000;
    s.lastTs = ts;

    s.phase = (s.phase || 0) + dt * speed * 0.6;

    clearCanvas();

    const cx = W / 2, cy = H / 2;
    const maxR = Math.min(W, H) * 0.42;
    const minR = 8;

    let tRaw = (Math.sin(s.phase) + 1) / 2;
    if (mode === 'in') tRaw = Math.abs(Math.sin(s.phase / 2));
    if (mode === 'out') tRaw = 1 - Math.abs(Math.sin(s.phase / 2));

    const r = minR + (maxR - minR) * tRaw;

    // concentric depth rings
    const numRings = 5;
    for (let i = numRings; i >= 1; i--) {
      const ri = r * (i / numRings);
      const alpha = 0.08 + 0.08 * (i / numRings);
      ctx.beginPath();
      ctx.arc(cx, cy, ri, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(0,200,83,${alpha})`;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }

    // main circle
    const grad = ctx.createRadialGradient(cx, cy, r * 0.5, cx, cy, r);
    grad.addColorStop(0, `rgba(105,240,174,${0.05 + tRaw * 0.1})`);
    grad.addColorStop(1, 'rgba(0,200,83,0)');
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = `rgba(0,200,83,${0.5 + tRaw * 0.5})`;
    ctx.lineWidth = 2 + tRaw * 3;
    ctx.stroke();

    // center dot
    ctx.beginPath();
    ctx.arc(cx, cy, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();

    // label
    const label = tRaw < 0.5 ? '← Receding →' : '→ Approaching ←';
    ctx.fillStyle = 'rgba(105,240,174,0.5)';
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(label, cx, H - 20);

    animId = requestAnimationFrame(convFrame);
  }

  document.getElementById('conv-start').addEventListener('click', () => {
    const dur = parseInt(document.getElementById('conv-dur').value);
    showStartStop('conv');
    convState = { phase: 0 };
    running = true;
    beginCountdown(() => {
      startSession(dur, () => {
        stopAll();
        sessionCount++;
        document.getElementById('footer-session').textContent = sessionCount;
        showOverlay('Session complete!', '');
      });
      animId = requestAnimationFrame(convFrame);
    });
  });
  document.getElementById('conv-stop').addEventListener('click', stopAll);

  // ══════════════════════════════════════════════════════
  // 4. PERIPHERAL VISION
  // ══════════════════════════════════════════════════════
  let periState = {};

  const DIFF = {
    easy:   { dotR: 10, showMs: 1200, count: [1, 3] },
    normal: { dotR: 7,  showMs: 800,  count: [2, 5] },
    hard:   { dotR: 4,  showMs: 500,  count: [3, 7] },
  };

  function periDraw() {
    clearCanvas();
    const cx = W/2, cy = H/2;

    // center fixation cross
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(cx-14,cy); ctx.lineTo(cx+14,cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,cy-14); ctx.lineTo(cx,cy+14); ctx.stroke();
    ctx.beginPath();
    ctx.arc(cx,cy,5,0,Math.PI*2);
    ctx.fillStyle = '#fff';
    ctx.fill();

    ctx.fillStyle = 'rgba(105,240,174,0.6)';
    ctx.font = '13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Keep your gaze on the center cross', cx, H - 15);

    if (periState.showDots && periState.dots) {
      periState.dots.forEach(d => {
        ctx.beginPath();
        ctx.arc(d.x, d.y, periState.dotR, 0, Math.PI*2);
        ctx.fillStyle = '#69f0ae';
        ctx.fill();
      });
    }
  }

  function periGenDots(diff) {
    const cfg = DIFF[diff];
    const [minC, maxC] = cfg.count;
    const n = minC + Math.floor(Math.random() * (maxC - minC + 1));
    const cx = W/2, cy = H/2;
    const innerR = 100;
    const margin = 40;
    const dots = [];
    for (let i = 0; i < n; i++) {
      let x, y, tries = 0;
      do {
        x = margin + Math.random() * (W - margin*2);
        y = margin + Math.random() * (H - margin*2);
        tries++;
      } while (Math.hypot(x - cx, y - cy) < innerR && tries < 50);
      dots.push({x, y});
    }
    return { dots, n, dotR: cfg.dotR, showMs: cfg.showMs };
  }

  function periShowAnswerBtns(n) {
    const wrap = document.getElementById('peri-answer-btns');
    wrap.innerHTML = '<span style="color:var(--text-dim);font-size:0.9rem;">Count seen:</span>';
    wrap.style.display = 'flex';
    wrap.classList.remove('hidden');
    const max = DIFF[document.getElementById('peri-diff').value].count[1];
    for (let i = 0; i <= max; i++) {
      const b = document.createElement('button');
      b.className = 'btn btn-secondary';
      b.style.padding = '6px 14px';
      b.textContent = i;
      b.addEventListener('click', () => periAnswer(i, n));
      wrap.appendChild(b);
    }
  }

  function periAnswer(guess, actual) {
    const correct = guess === actual;
    periState.scores.push(correct ? 1 : 0);
    periState.round++;
    document.getElementById('peri-answer-btns').classList.add('hidden');

    clearCanvas();
    const cx = W/2, cy = H/2;
    ctx.font = 'bold 28px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = correct ? '#69f0ae' : '#ef9a9a';
    ctx.fillText(correct ? 'Correct!' : `Wrong — answer was ${actual}`, cx, cy - 20);
    ctx.font = '16px sans-serif';
    ctx.fillStyle = 'rgba(200,230,201,0.7)';
    ctx.fillText(`Round ${periState.round} / ${periState.totalRounds}`, cx, cy + 20);

    const scoreEl = document.getElementById('peri-score-display');
    const correctCount = periState.scores.filter(s => s).length;
    scoreEl.textContent = `Score: ${correctCount} / ${periState.round}`;
    scoreEl.classList.remove('hidden');

    if (periState.round >= periState.totalRounds) {
      setTimeout(() => periEnd(correctCount), 1200);
    } else {
      setTimeout(periNextRound, 1200);
    }
  }

  function periNextRound() {
    if (!running) return;
    const diff = document.getElementById('peri-diff').value;
    const result = periGenDots(diff);
    periState.dots = result.dots;
    periState.dotR = result.dotR;
    periState.showDots = true;
    periDraw();

    setTimeout(() => {
      if (!running) return;
      periState.showDots = false;
      periDraw();
      periShowAnswerBtns(result.n);
    }, result.showMs);
  }

  function periEnd(correctCount) {
    running = false;
    sessionCount++;
    document.getElementById('footer-session').textContent = sessionCount;
    document.getElementById('footer-score-wrap').style.display = '';
    document.getElementById('footer-score').textContent =
      `${correctCount} / ${periState.totalRounds}`;

    showOverlay(`Done! Score: ${correctCount} / ${periState.totalRounds}`, '');
    document.getElementById('peri-start').classList.remove('hidden');
    document.getElementById('peri-stop').classList.add('hidden');
    document.getElementById('peri-answer-btns').classList.add('hidden');
  }

  document.getElementById('peri-start').addEventListener('click', () => {
    const rounds = parseInt(document.getElementById('peri-rounds').value);
    periState = { round: 0, totalRounds: rounds, scores: [], showDots: false };
    running = true;
    showStartStop('peri');
    document.getElementById('peri-score-display').classList.add('hidden');
    document.getElementById('footer-score-wrap').style.display = 'none';
    beginCountdown(() => {
      periDraw();
      setTimeout(periNextRound, 600);
    });
  });
  document.getElementById('peri-stop').addEventListener('click', () => {
    document.getElementById('peri-answer-btns').classList.add('hidden');
    stopAll();
  });

  // ── Init ────────────────────────────────────────────────
  clearCanvas();
  showOverlay('Press Start when ready', '');
})();
</script>
</body>
</html>
